name: Wealth Stories - Video Pipeline

on:
  # Manual trigger with custom topic
  workflow_dispatch:
    inputs:
      topic:
        description: 'Story topic (English)'
        required: true
        default: 'A poor boy from a village who became a millionaire with just 100 rupees'
        type: string

  # Daily 7 AM IST = 1:30 AM UTC
  schedule:
    - cron: '30 1 * * *'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run Wealth Stories Pipeline
        env:
          # ── Gemini keys (one per Gmail account — all free) ──────────────────
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}    # old single key (backward compat)
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}  # Gmail account 1
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}  # Gmail account 2
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}  # Gmail account 3

          # ── Other script providers ───────────────────────────────────────────
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}

          # ── Image fallback providers ─────────────────────────────────────────
          HF_API_KEY:        ${{ secrets.HF_API_KEY }}        # Seedream 3.0 fallback
          CF_API_TOKEN:      ${{ secrets.CF_API_TOKEN }}      # Cloudflare FLUX fallback
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}     # Cloudflare account ID

        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            TOPIC=$(python scripts/random_topic.py)
            echo "Today's topic: $TOPIC"
          else
            TOPIC="${{ github.event.inputs.topic }}"
          fi
          echo "Running pipeline with topic: $TOPIC"
          python scripts/pipeline.py "$TOPIC"

      - name: Upload Video + Assets
        uses: actions/upload-artifact@v4
        with:
          name: wealth-stories-${{ github.run_number }}
          path: |
            output/final_video.mp4
            output/metadata.json
            output/script.json
            output/scene_*.jpg
          retention-days: 7

      - name: Job Summary
        run: |
          echo "## Wealth Stories - Video Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/metadata.json ]; then
            TITLE=$(python -c "import json; print(json.load(open('output/metadata.json'))['youtube_title'])")
            PROVIDER=$(python -c "import json; print(json.load(open('output/script.json')).get('_provider','?'))")
            echo "**YouTube Title:** $TITLE" >> $GITHUB_STEP_SUMMARY
            echo "**Script Provider:** $PROVIDER" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Files:" >> $GITHUB_STEP_SUMMARY
          ls -lh output/ >> $GITHUB_STEP_SUMMARY
