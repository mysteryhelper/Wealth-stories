name: Wealth Stories — Video Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Story topic (English)'
        required: true
        default: 'A poor boy from a village who became a millionaire with just ₹100'
        type: string
  schedule:
    - cron: '30 1 * * *'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg -qq
      - name: Install Python packages
        run: pip install -r requirements.txt
      - name: Run Wealth Stories Pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            TOPIC=$(python scripts/random_topic.py)
          else
            TOPIC="${{ github.event.inputs.topic }}"
          fi
          python scripts/pipeline.py "$TOPIC"
      - name: Upload Video + Assets
        uses: actions/upload-artifact@v4
        with:
          name: wealth-stories-${{ github.run_number }}
          path: |
            output/final_video.mp4
            output/metadata.json
            output/script.json
            output/scene_*.jpg
          retention-days: 7
      - name: Job Summary
        run: |
          echo "## 💰 Wealth Stories — Video Ready!" >> $GITHUB_STEP_SUMMARY
          if [ -f output/metadata.json ]; then
            TITLE=$(python -c "import json; print(json.load(open('output/metadata.json'))['youtube_title'])")
            echo "**YouTube Title:** $TITLE" >> $GITHUB_STEP_SUMMARY
          fi
          ls -lh output/ >> $GITHUB_STEP_SUMMARY
